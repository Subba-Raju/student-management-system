<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Student – SMS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="nav-brand">🎓 Student Management System</div>
    <div class="nav-links">
      <a href="index.html">All Students</a>
      <a href="add-student.html" class="active">+ Add Student</a>
    </div>
  </nav>

  <!-- ── FORM ── -->
  <div class="container">
    <div class="form-card">
      <h2>Add New Student</h2>
      <p class="form-subtitle">Fill in the details below and click Save.</p>

      <form action="AddStudentServlet" method="POST" id="addForm">

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name"
                 placeholder="e.g. Bale Subba Raju" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email"
                   placeholder="e.g. subba@email.com" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone"
                   placeholder="e.g. 9347373866"
                   pattern="[0-9]{10}" maxlength="10" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="course">Course</label>
            <select id="course" name="course" required>
              <option value="">-- Select Course --</option>
              <option value="B.Tech CSE">B.Tech CSE</option>
              <option value="B.Tech ECE">B.Tech ECE</option>
              <option value="B.Tech MECH">B.Tech MECH</option>
              <option value="B.Tech CIVIL">B.Tech CIVIL</option>
              <option value="BCA">BCA</option>
              <option value="MCA">MCA</option>
              <option value="MBA">MBA</option>
            </select>
          </div>
          <div class="form-group">
            <label for="marks">Marks (%)</label>
            <input type="number" id="marks" name="marks"
                   placeholder="e.g. 85.5"
                   min="0" max="100" step="0.01" required />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">💾 Save Student</button>
          <a href="index.html" class="btn-secondary">✖ Cancel</a>
        </div>

      </form>
    </div>
  </div>

  <script>
    // Basic client-side validation before submit
    document.getElementById('addForm').addEventListener('submit', function (e) {
      const phone = document.getElementById('phone').value;
      if (phone.length !== 10 || isNaN(phone)) {
        alert('Please enter a valid 10-digit phone number.');
        e.preventDefault();
      }
    });
  </script>

</body>
</html>
