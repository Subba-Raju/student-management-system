<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Student – SMS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="nav-brand">🎓 Student Management System</div>
    <div class="nav-links">
      <a href="index.html">All Students</a>
      <a href="add-student.html">+ Add Student</a>
    </div>
  </nav>

  <!-- ── EDIT FORM ── -->
  <div class="container">
    <div class="form-card">
      <h2>✏️ Edit Student</h2>
      <p class="form-subtitle">Update the details and click Save Changes.</p>

      <!--
        When connected to Java Servlet:
        action="UpdateStudentServlet"
        Values will be pre-filled by the servlet using student ID
      -->
      <form action="UpdateStudentServlet" method="POST" id="editForm">

        <!-- Hidden field — sends student ID to servlet -->
        <input type="hidden" name="id" value="1" />

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name"
                 value="Ravi Kumar" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email"
                   value="ravi@example.com" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone"
                   value="9876543210"
                   pattern="[0-9]{10}" maxlength="10" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="course">Course</label>
            <select id="course" name="course" required>
              <option value="B.Tech CSE"  selected>B.Tech CSE</option>
              <option value="B.Tech ECE">B.Tech ECE</option>
              <option value="B.Tech MECH">B.Tech MECH</option>
              <option value="B.Tech CIVIL">B.Tech CIVIL</option>
              <option value="BCA">BCA</option>
              <option value="MCA">MCA</option>
              <option value="MBA">MBA</option>
            </select>
          </div>
          <div class="form-group">
            <label for="marks">Marks (%)</label>
            <input type="number" id="marks" name="marks"
                   value="85.50"
                   min="0" max="100" step="0.01" required />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">💾 Save Changes</button>
          <a href="index.html" class="btn-secondary">✖ Cancel</a>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
